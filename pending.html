<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pending Verifikasi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at top left, rgba(255,215,0,.12), transparent 35%),linear-gradient(135deg,#12051f,#2d0b45,#4c1d95,#7e22ce);color:#fff}
.card{max-width:600px;width:100%;text-align:center;background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.15);border-radius:28px;padding:35px}
.icon{font-size:70px;margin-bottom:15px}
h1{color:#FFD700;margin-bottom:10px}
.info{line-height:1.8;margin-top:15px}
.badge{display:inline-block;background:rgba(255,215,0,.15);padding:10px 18px;border-radius:999px;margin:15px 0;color:#FFD700;font-weight:700}
.timer{margin-top:15px;font-size:20px;font-weight:700}
</style></head>
<body><div class="card">
<div class="icon">⏳</div>
<h1>Pembayaran Sedang Diverifikasi</h1>
<div class="badge">STATUS: PENDING</div>
<div class="info">
<p>Terima kasih. Bukti pembayaran telah berhasil dikirim.</p>
<p>Tim kami akan melakukan verifikasi pembayaran Anda secepatnya.</p>
<p>Anda akan diarahkan otomatis ke halaman sukses.</p>
</div>
<div class="timer">Redirect dalam <span id="count">15</span> detik</div>
</div>
<script>
let s=15;
const el=document.getElementById('count');
const t=setInterval(()=>{
s--;
el.textContent=s;
if(s<=0){
clearInterval(t);
window.location.href='success.html';
}
},1000);
</script>
</body></html>
